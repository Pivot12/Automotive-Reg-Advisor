name: Regulatory Watch — daily change check

# Runs every day at 09:00 UTC. Checks every official source for changes and
# updates public/data/changes.json (read by the Regulatory Watch tab). Zero human involvement.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check regulators for changes
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}   # optional; works without it
        run: node scripts/refresh.mjs
      - name: Commit updated change log & snapshots
        run: |
          git config user.name "auto-reg-bot"
          git config user.email "actions@github.com"
          git add public/data/changes.json data/snapshots
          git commit -m "chore: regulatory watch update $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
